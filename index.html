<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menús Expres</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 5px;
        }

        .carousel-image {
            max-width: 49.5%;
            max-height: 99%;
            object-fit: contain;
            display: block;
            cursor: pointer;
            transition: opacity 0.5s ease-in-out;
        }

        .carousel-image.fade-out {
            opacity: 0;
        }

        .carousel-image.fade-in {
            opacity: 1;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .fullscreen-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .fullscreen-btn.visible {
            opacity: 1;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid white;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s, background-color 0.2s;
            opacity: 0;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn-left {
            left: 20px;
        }

        .nav-btn-right {
            right: 20px;
        }

        .nav-btn.visible {
            opacity: 1;
        }

        /* Cuando una sola imagen debe ocupar todo el ancho y alto */
        .carousel-image.single {
            max-width: 100% !important;
            width: 100% !important;
            max-height: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            z-index: 5;
        }

        .carousel-image.hidden {
            display: none !important;
        }
    </style>
    </head>
    <body>
        <div class="carousel-container">
            <div class="carousel">
                <img id="image1" class="carousel-image fade-in"
                    src="imgs/Bowls.png" alt="Menú" decoding="async" loading="eager">
                <img id="image2" class="carousel-image fade-in"
                    src="imgs/Burritos.png" alt="Menú" decoding="async" loading="eager">
            </div>
            <button class="nav-btn nav-btn-left" id="prevBtn" aria-label="Anterior">❮</button>
            <button class="nav-btn nav-btn-right" id="nextBtn" aria-label="Siguiente">❯</button>
            <button class="fullscreen-btn" id="fullscreenBtn">🖥️ Pantalla
                Completa</button>
        </div>
        <script>
        const image1 = document.getElementById('image1');
        const image2 = document.getElementById('image2');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const carouselContainer = document.querySelector('.carousel-container');
        let hideTimeout;
        let autoChangeTimer;

        // Placeholder SVG data URL shown when an image fails to load
        const placeholderDataUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800">' +
            '<rect width="100%" height="100%" fill="#111"/>' +
            '<text x="50%" y="50%" fill="#ccc" font-size="32" text-anchor="middle" dy=".3em">Imagen no disponible</text>' +
            '</svg>'
        );

        // Gestiona errores de carga de una imagen: reemplaza por placeholder y marca en consola
        function handleImageError(img) {
            console.warn('Fallo al cargar imagen:', img.src);
            img.onerror = null; // evitar bucle
            img.src = placeholderDataUrl;
            img.classList.remove('hidden');
            img.classList.add('fade-in');
        }

        // Pre-carga todas las rutas declaradas en `images` y registra fallos
        function preloadAllImages(list) {
            const checks = list.map(src => new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve({ src, ok: true });
                img.onerror = () => resolve({ src, ok: false });
                img.src = src;
            }));
            return Promise.all(checks).then(results => {
                const failed = results.filter(r => !r.ok).map(r => r.src);
                if (failed.length) {
                    console.warn('Las siguientes imágenes no se pudieron precargar:', failed);
                }
                return results;
            });
        }

        // Array de todas las imágenes disponibles
        const images = [
            'imgs/Bowls.png',
            'imgs/Burritos.png',
            'imgs/Chamorro.png',
            'imgs/Desayuno-continental.png',
            'imgs/Kids.png',
            'imgs/Lonche-pollo.png',
            'imgs/Lonche.png',
            'imgs/Parrillada-4-personas.png',
            'imgs/Parrillada-6-a-8-personas.png',
            'imgs/Pizza-quesadilla.png',
            'imgs/Sandwich.png',
            'imgs/Burguesa-Pollo-Empanizado.png',
            'imgs/Kids-2.png',

            

        ];

        let currentIndex = 0;
        const imageChangeInterval = 18000; // Cambiar cada 18 segundos

        // Mostrar botones al mover el mouse o usar control remoto
        document.addEventListener('mousemove', showControls);
        document.addEventListener('keydown', showControls);
        document.addEventListener('touchstart', showControls, { passive: true });

        // Botón de pantalla completa
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        prevBtn.addEventListener('click', () => {
            showControls();
            goToPreviousPair();
            startAutoCarousel();
        });
        nextBtn.addEventListener('click', () => {
            showControls();
            goToNextPair();
            startAutoCarousel();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowLeft') {
                goToPreviousPair();
                startAutoCarousel();
            } else if (event.key === 'ArrowRight') {
                goToNextPair();
                startAutoCarousel();
            }
        });

        function showControls() {
            fullscreenBtn.classList.add('visible');
            prevBtn.classList.add('visible');
            nextBtn.classList.add('visible');

            // Limpiar el temporizador anterior
            clearTimeout(hideTimeout);

            // Ocultar botones después de 3 segundos de inactividad
            hideTimeout = setTimeout(() => {
                fullscreenBtn.classList.remove('visible');
                prevBtn.classList.remove('visible');
                nextBtn.classList.remove('visible');
            }, 3000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                // Entrar en pantalla completa
                if (carouselContainer.requestFullscreen) {
                    carouselContainer.requestFullscreen();
                } else if (carouselContainer.webkitRequestFullscreen) {
                    carouselContainer.webkitRequestFullscreen();
                } else if (carouselContainer.mozRequestFullScreen) {
                    carouselContainer.mozRequestFullScreen();
                } else if (carouselContainer.msRequestFullscreen) {
                    carouselContainer.msRequestFullscreen();
                }
            } else {
                // Salir de pantalla completa
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Cambiar el texto del botón cuando entra/sale de pantalla completa
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '⊞ Salir Pantalla Completa';
            } else {
                fullscreenBtn.textContent = '🖥️ Pantalla Completa';
            }
        });

        // Ajusta la presentación para mostrar solo Bowls cuando aparezca
        function updateLayoutForCurrentImages(imgA, imgB) {
            const isA = imgA && imgA.toLowerCase().includes('bowls.png');
            const isB = imgB && imgB.toLowerCase().includes('bowls.png');

            // Reset styles
            image1.classList.remove('single', 'hidden');
            image2.classList.remove('single', 'hidden');
            image1.style.display = 'block';
            image2.style.display = 'block';
            image1.style.maxWidth = '';
            image2.style.maxWidth = '';

            if (isA && !isB) {
                // Mostrar solo image1
                image1.classList.add('single');
                image2.classList.add('hidden');
            } else if (isB && !isA) {
                // Mostrar solo image2
                image2.classList.add('single');
                image1.classList.add('hidden');
            } else {
                // Ninguna es Bowls o ambas lo son: mostrar ambas normalmente
                image1.classList.remove('single', 'hidden');
                image2.classList.remove('single', 'hidden');
                image1.style.display = 'block';
                image2.style.display = 'block';
            }
        }

        // Función para cambiar las imágenes
        function changeImages() {
            // Agregar efecto fade out
            image1.classList.add('fade-out');
            image2.classList.add('fade-out');

            setTimeout(() => {
                const imgA = images[currentIndex % images.length];
                const imgB = images[(currentIndex + 1) % images.length];

                // Cambiar las imágenes
                image1.src = imgA;
                image2.src = imgB;

                // Ajustar layout si alguno es Bowls
                updateLayoutForCurrentImages(imgA, imgB);

                // Remover fade out y agregar fade in
                image1.classList.remove('fade-out');
                image1.classList.add('fade-in');
                image2.classList.remove('fade-out');
                image2.classList.add('fade-in');
            }, 250);
        }

        function goToNextPair() {
            currentIndex = (currentIndex + 2) % images.length;
            changeImages();
        }

        function goToPreviousPair() {
            currentIndex = (currentIndex - 2 + images.length) % images.length;
            changeImages();
        }

        function startAutoCarousel() {
            clearInterval(autoChangeTimer);
            autoChangeTimer = setInterval(goToNextPair, imageChangeInterval);
        }

        // Ajuste inicial según las imágenes ya presentes
        updateLayoutForCurrentImages(images[currentIndex % images.length], images[(currentIndex + 1) % images.length]);

        // Añadir manejadores de error a los elementos visibles
        image1.onerror = function() { handleImageError(image1); };
        image2.onerror = function() { handleImageError(image2); };

        // Pre-cargar y luego iniciar el carousel
        preloadAllImages(images).then(() => {
            startAutoCarousel();
        });
    </script>
    </body>
</html>
